<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0b1220" />
    <title>openhouse-connect</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="app" class="app">
      <header class="topbar">
        <div class="brand">
          <div class="brand__name">openhouse-connect</div>
          <div id="statusPill" class="pill pill--neutral" title="Backend connectivity">
            <span class="dot"></span>
            <span id="statusText">disconnected</span>
          </div>
        </div>

        <div class="controls">
          <label class="field">
            <span class="field__label">Project</span>
            <input
              id="projectInput"
              class="field__input"
              type="text"
              autocapitalize="off"
              autocomplete="off"
              spellcheck="false"
            />
          </label>

          <label class="field">
            <span class="field__label">Session</span>
            <div class="field__row">
              <input
                id="sessionInput"
                class="field__input field__input--session"
                type="text"
                autocapitalize="off"
                autocomplete="off"
                spellcheck="false"
              />
              <button id="applyBtn" class="iconbtn" type="button" title="Apply project/session">
                <span class="iconbtn__text">Go</span>
              </button>
            </div>
          </label>

          <label class="field">
            <span class="field__label">Sessions</span>
            <div class="field__row">
              <select id="sessionSelect" class="field__select" aria-label="Session list"></select>
              <button id="refreshSessionsBtn" class="iconbtn" type="button" title="Refresh session list">
                <span class="iconbtn__text">R</span>
              </button>
            </div>
          </label>
        </div>
      </header>

      <main class="main">
        <div id="messageList" class="messages" role="log" aria-live="polite" aria-relevant="additions text"></div>
        <button id="newMsgBtn" class="newmsg" type="button" hidden>New messages</button>
      </main>

      <footer class="composerWrap">
        <form id="composerForm" class="composer" autocomplete="off">
          <textarea
            id="composerInput"
            class="composer__input"
            rows="1"
            placeholder="Message..."
            autocapitalize="sentences"
            autocomplete="off"
            spellcheck="true"
          ></textarea>
          <button id="sendBtn" class="sendbtn" type="submit" title="Send">Send</button>
        </form>
      </footer>
    </div>

    <script src="./app.js" defer></script>
  </body>
</html>
